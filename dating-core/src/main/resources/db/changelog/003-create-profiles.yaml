databaseChangeLog:
  - changeSet:
      id: 003-create-profiles
      author: dating
      changes:
        - createTable:
            tableName: profiles
            columns:
              - column: {name: id, type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: {name: user_id, type: UUID, constraints: { unique: true, nullable: false } }
              - column: {name: display_name, type: VARCHAR(100), constraints: { nullable: false } }
              - column: {name: birth_date, type: DATE}
              - column: {name: gender, type: VARCHAR(16)}
              - column: {name: bio, type: TEXT}
              - column: {name: city, type: VARCHAR(255)}
              - column: {name: created_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: {name: updated_at, type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
        - addForeignKeyConstraint:
            baseTableName: profiles
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_profile_user