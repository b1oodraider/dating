spring:
  application:
    name: dating-core
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dating}
    username: ${DB_USER:dating}
    password: ${DB_PASSWORD:dating}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      auto-offset-reset: earliest

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-use-at-least-32-bytes-secret-key}
    access-ttl-minutes: 15
    refresh-ttl-days: 30

springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8081