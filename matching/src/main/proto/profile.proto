// TODO: это КОПИЯ dating-core/src/main/proto/profile.proto — два файла разъедутся молча,
//  и matching начнёт видеть пустые поля вместо новых. Контракт должен жить в одном месте:
//  отдельный maven-модуль с proto (contract-first) или Buf registry.
//  Заодно java_package указывает на com.dating.core.* — чужой неймспейс внутри matching.
syntax="proto3";

package dating.profile.v1;

option java_package = "com.dating.core.profile.grpc.proto";
option java_multiple_files=true;

service ProfileService {
  rpc GetProfile(GetProfileRequest) returns (ProfileMessage) ;
  rpc GetProfilesBatch(GetProfilesBatchRequest) returns (GetProfilesBatchResponse);
}

message GetProfileRequest {
  string id = 1;
}

message ProfileMessage {
  string id = 1;
  string user_id = 2;
  string display_name = 3;
  string birth_date = 4;
  string gender = 5;
  string city = 6;
  string bio = 7;
}
message GetProfilesBatchRequest {
  repeated string ids = 1;
}

message GetProfilesBatchResponse {
  repeated ProfileMessage profiles = 1;
}