# CI-пайплайн для всех модулей репозитория (GitHub Actions).
# Лежит в КОРНЕ репозитория: .github/workflows/ci.yml
# Срабатывает на каждый push в master и на каждый pull request в master.
name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# Если в ту же ветку/PR прилетел новый коммит — отменяем предыдущий запуск,
# чтобы не гонять устаревшую сборку и не жечь минуты.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Принцип наименьших привилегий: по умолчанию только чтение репозитория.
permissions:
  contents: read

jobs:
  # ---------- Джоба 1: сборка + тесты (каждый модуль — отдельный запуск матрицы) ----------
  build-test:
    name: Build & Test ${{ matrix.module }} (JDK 25)
    runs-on: ubuntu-latest              # GitHub-раннер; в нём УЖЕ есть Docker (нужно Testcontainers)
    strategy:
      fail-fast: false                  # падение одного модуля не отменяет сборку второго
      matrix:
        module: [ dating-core, api-gateway ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven                  # кешируем ~/.m2 между запусками → сборка быстрее

      - name: Build and run tests
        working-directory: ${{ matrix.module }}
        run: |
          chmod +x mvnw                 # на Windows исполняемый бит часто теряется — выставляем
          ./mvnw -B -ntp verify         # компиляция + все тесты (вкл. Testcontainers) + упаковка jar

      - name: Upload test reports
        if: always()                    # выкладываем отчёты, даже если тесты упали
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.module }}
          path: ${{ matrix.module }}/target/surefire-reports/
          if-no-files-found: ignore

  # ---------- Джоба 2: сборка и публикация Docker-образов (CD-lite) ----------
  # Идёт только после зелёной build-test и только на push в master (не на PR).
  # Имя образа включает модуль (ghcr.io/<repo>/<module>), иначе образы
  # dating-core и api-gateway перезаписывали бы друг друга под одним тегом.
  docker-image:
    name: Build & push ${{ matrix.module }} image (ghcr.io)
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [ dating-core, api-gateway ]
    permissions:
      contents: read
      packages: write                   # право пушить образ в GitHub Container Registry
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # выдаётся автоматически, свой секрет не нужен

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.module }} # тут лежат Dockerfile, pom.xml, src
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.module }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.module }}:${{ github.sha }}
